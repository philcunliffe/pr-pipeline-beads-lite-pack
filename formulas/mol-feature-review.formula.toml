description = """
Feature-review wrapper around `mol-pr-dual-review` for the
integration-branch flow. Runs the dual-agent review (Codex + Claude +
risk capstone) against the draft PR that fronts an integration branch,
reads the verdict the sub-formula records, and either marks the review
approved or runs Codex directly to fix findings on the integration branch.

A coding agent (polecat or equivalent) runs this when a review bead is
dispatched, either manually or by the gastown-beads-lite refinery's
post-merge auto-routing (gb-RTR). The formula composes the dual-review
sub-formula and routes on its verdict — it does not re-implement the
scorecard.

## Beads-Lite Command Note

In gastown-beads-lite rig sessions, translate the `bd ...` examples below to:

```bash
BEADS_DIR=<rig-root>/.beads gc gastown-beads-lite bd ...
```

Do not use a global `bd`, normal `gc bd`, Dolt commands, or `bd --db`.

## Metadata convention

The metadata fields this formula reads (`target`, `feature_phase`) and
writes (`target`, `feature_phase=fix`, `merge_strategy=integration`,
`gc.routed_to`, `pr`, `source_review_bead`) follow the foundation bead
(`gb-FND` in `gastown-beads-lite-pack`). The formula does not define
the convention — it consumes it.

## Contract

1. Caller slings with `--var pr=<draft-PR-number>` and
   `--var integration_branch=<branch-name>`
2. Agent works through 4 sequential steps
3. Sub-formula `mol-pr-dual-review` runs against the draft PR; its
   combined report index is written to
   `${GC_CITY_PATH}/.gc/pr-pipeline/reviews/pr-<N>/dual-review.md`
4. Verdict (`approve` | `request_changes`) is read from the
   sub-formula bead's notes
5. On `approve`: root bead notes record `verdict: approve` and
   `status: complete`. The formula files the subsequent ship bead
   inline (with full feature-flow metadata), then closes the review
   bead so the polecat drains cleanly.
6. On `request_changes`: Codex (`gpt-5.5`, max reasoning) is run
   directly in this polecat session to fix findings. After the fix
   merges, refinery routing files `mol-feature-post-fix-review`
   before ship can run.

## Failure Modes

| Situation | Action |
|-----------|--------|
| PR does not exist or is not draft | Failure path: witness mail, blocked |
| Headref does not match integration_branch | Failure path: witness mail, blocked |
| Sub-formula crashes | Failure path: witness mail, blocked |
| Verdict cannot be parsed from sub-formula notes | Failure path: witness mail, blocked |"""
formula = "mol-feature-review"
version = 1

[vars]
[vars.pr]
description = "Draft PR number of the integration branch (bare integer in current repo)"
required = true

[vars.integration_branch]
description = "Integration branch name. Used for routing context and the rollup fix bead's metadata.target."
required = true

[[steps]]
id = "intake"
title = "Confirm PR is draft and matches integration_branch"
description = """
Resolve the root bead, confirm metadata convention, and verify the
draft PR matches the integration branch.

```bash
ROOT_ID=$(bd mol current --json | jq -r 'if type == "array" then .[0].molecule_id else .molecule_id end')
REPO_ROOT=$(git rev-parse --show-toplevel 2>/dev/null) || {
    echo "Not in a git repository — cannot review feature."
    bd update "$ROOT_ID" --notes "status: blocked
failure: not a git checkout"
    exit 1
}
cd "$REPO_ROOT"
```

Confirm the bead is the right shape:

```bash
TARGET=$(bd show "$ROOT_ID" --json | jq -r '.[0].metadata.target // ""')
PHASE=$(bd show "$ROOT_ID" --json | jq -r '.[0].metadata.feature_phase // ""')
if [ "$TARGET" != "{{integration_branch}}" ]; then
    echo "metadata.target ($TARGET) does not match integration_branch ({{integration_branch}})"
    bd update "$ROOT_ID" --notes "status: blocked
failure: target/integration_branch mismatch ($TARGET vs {{integration_branch}})"
    exit 1
fi
if [ "$PHASE" != "review" ]; then
    echo "metadata.feature_phase ($PHASE) is not 'review'"
    bd update "$ROOT_ID" --notes "status: blocked
failure: feature_phase is '$PHASE', expected 'review'"
    exit 1
fi
```

Confirm PR exists and is in draft state with the right headref:

```bash
PR_JSON=$(gh pr view {{pr}} --json state,isDraft,headRefName 2>/dev/null) || {
    echo "PR #{{pr}} not found"
    bd update "$ROOT_ID" --notes "status: blocked
failure: gh pr view {{pr}} failed"
    exit 1
}
IS_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft')
HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')
PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
if [ "$IS_DRAFT" != "true" ]; then
    echo "PR #{{pr}} is not draft (isDraft=$IS_DRAFT, state=$PR_STATE)"
    bd update "$ROOT_ID" --notes "status: blocked
failure: PR #{{pr}} not draft (state=$PR_STATE)"
    exit 1
fi
if [ "$HEAD_REF" != "{{integration_branch}}" ]; then
    echo "PR #{{pr}} headRef ($HEAD_REF) does not match integration_branch ({{integration_branch}})"
    bd update "$ROOT_ID" --notes "status: blocked
failure: PR headRef ($HEAD_REF) != integration_branch ({{integration_branch}})"
    exit 1
fi
```

Record initial state:

```bash
bd update "$ROOT_ID" --notes "pr: {{pr}}
integration_branch: {{integration_branch}}
pr_state: $PR_STATE
status: in_progress"
```

**Exit criteria:** PR exists, is draft, headRef matches
integration_branch, metadata confirmed; initial state recorded.

If any check fails: jump to the failure path described in `route`.
"""

[[steps]]
id = "run-review"
title = "Compose mol-pr-dual-review against the draft PR"
description = """
Run the dual-agent outgoing-PR review (Codex + Claude + risk capstone)
against PR `{{pr}}`. The sub-formula writes a combined report index to
`${GC_CITY_PATH}/.gc/pr-pipeline/reviews/pr-{{pr}}/dual-review.md` and
records its verdict (`approve` | `request_changes`) in the
sub-formula bead's notes.

The sub-formula lives in the `pr-pipeline` rig. Invoke it via the
cross-pack command wrapper — do **not** sling locally with `gc
<local-rig> sling ...`, that creates an orphaned bead in the wrong
rig's store. The single canonical call is:

```bash
ROOT_ID=$(bd mol current --json | jq -r 'if type == "array" then .[0].molecule_id else .molecule_id end')
NOTES=$(bd show "$ROOT_ID" --json | jq -r '.[0].notes // ""')
REPO_ROOT=$(git rev-parse --show-toplevel 2>/dev/null)
RIG="${GC_RIG:-$(basename "$REPO_ROOT")}"

if [ -n "${GC_CITY_PATH:-}" ]; then
    REPORT_PATH="${GC_CITY_PATH}/.gc/pr-pipeline/reviews/pr-{{pr}}/dual-review.md"
else
    REPORT_PATH=".gc/pr-pipeline/reviews/pr-{{pr}}/dual-review.md"
fi

extract_existing_bead_id() {
    candidates=$(printf '%s\n' "$1" | grep -oE '[a-z][a-z0-9]*-[a-z0-9]+' || true)
    [ -n "$candidates" ] || return 0
    printf '%s\n' "$candidates" \
        | while IFS= read -r candidate; do
            bd show "$candidate" --json >/dev/null 2>&1 && printf '%s\n' "$candidate"
          done \
        | tail -1
}

# Recovery/idempotency: if a prior attempt already slung the dual-review
# sub-formula, do not create a duplicate. Reuse it and let read-verdict poll.
EXISTING_SUB=$(echo "$NOTES" | grep -m1 '^sub_review_bead:' | sed 's/^sub_review_bead: //')
if [ -n "$EXISTING_SUB" ]; then
    EXISTING_STATUS=$(bd show "$EXISTING_SUB" --json 2>/dev/null | jq -r '.[0].status // ""' || true)
    case "$EXISTING_STATUS" in
        closed|open|in_progress)
            bd update "$ROOT_ID" --notes "sub_review_bead: $EXISTING_SUB
review_report: $REPORT_PATH"
            echo "[feature-review] re-entry: reusing sub_review_bead $EXISTING_SUB (status=$EXISTING_STATUS)"
            exit 0
            ;;
        *)
            echo "[feature-review] re-entry: prior sub_review_bead $EXISTING_SUB has status '$EXISTING_STATUS'; re-slinging"
            ;;
    esac
fi

# Cross-pack sub-sling. The wrapper prints the new sub-bead's ID;
# capture it for the verdict-read step.
SUB_OUT=$(gc pr-pipeline pr dual-review {{pr}} --rig "$RIG" 2>&1)
SUB_BEAD=$(extract_existing_bead_id "$SUB_OUT")

if [ -z "$SUB_BEAD" ]; then
    bd update "$ROOT_ID" --notes "status: blocked
failure: could not capture sub-bead from mol-pr-dual-review (output: $SUB_OUT)"
    exit 1
fi
bd update "$ROOT_ID" --notes "sub_review_bead: $SUB_BEAD
review_report: $REPORT_PATH"
```

Do not run any other review formula in this step — `mol-pr-review` is
the legacy single-agent path and must not be slung here. Do not inline
the review logic. If `gc pr-pipeline pr dual-review --rig "$RIG"` fails, jump
to the failure path in `route`; do not fall back to a local sling or
to the old single-agent formula.

**Exit criteria:** Sub-formula has been slung cross-pack to the
pr-pipeline binding, or an existing sub-formula bead has been reused
on recovery. The resulting bead ID is recorded on the root bead as
`sub_review_bead`; `review_report` is also recorded. Do **not** advance
to verdict-read until the sub-bead is closed by the pr-pipeline polecat
— the verdict-read step polls `bd show $SUB_BEAD` until status flips.

If the sub-sling crashes: jump to the failure path in `route`.
"""
needs = ["intake"]

[[steps]]
id = "read-verdict"
title = "Wait for sub-bead to close and extract its verdict"
description = """
The sub-formula bead (`mol-pr-dual-review`, recorded as
`sub_review_bead` on the root) runs asynchronously in the same rig's
polecat pool. This step must poll until that sub-bead is closed, then
read `verdict:` from its notes. One of `approve` or `request_changes`.

Do **not** read or invent a verdict from the root bead's own notes —
the verdict only exists on the sub-bead. Do **not** time out and
guess. If polling exceeds the budget below, jump to the failure path
in `route`.

```bash
ROOT_ID=$(bd mol current --json | jq -r 'if type == "array" then .[0].molecule_id else .molecule_id end')
NOTES=$(bd show "$ROOT_ID" --json | jq -r '.[0].notes // ""')
SUB_BEAD=$(echo "$NOTES" | grep -m1 '^sub_review_bead:' | sed 's/^sub_review_bead: //')

if [ -z "$SUB_BEAD" ]; then
    bd update "$ROOT_ID" --notes "status: blocked
failure: read-verdict reached without sub_review_bead on root notes"
    exit 1
fi

# Poll the sub-bead until it closes. If a previous attempt recorded a
# complete verdict but failed before closing, accept that completed notes
# shape instead of spinning forever.
DEADLINE=$(( $(date +%s) + 45 * 60 ))
while :; do
    SUB_JSON=$(bd show "$SUB_BEAD" --json)
    SUB_STATUS=$(echo "$SUB_JSON" | jq -r '.[0].status // ""')
    SUB_NOTES=$(echo "$SUB_JSON" | jq -r '.[0].notes // ""')
    SUB_VERDICT=$(echo "$SUB_NOTES" | grep -m1 '^verdict:' | sed 's/^verdict: //' || true)
    SUB_NOTE_STATUS=$(echo "$SUB_NOTES" | grep -m1 '^status:' | sed 's/^status: //' || true)
    case "$SUB_STATUS" in
        closed) break ;;
        open|in_progress)
            case "$SUB_VERDICT" in
                approve|request_changes)
                    if [ "$SUB_NOTE_STATUS" = "complete" ]; then
                        echo "[feature-review] sub_review_bead $SUB_BEAD has completed notes but status=$SUB_STATUS; accepting verdict"
                        break
                    fi
                    ;;
            esac
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
                bd update "$ROOT_ID" --notes "status: blocked
failure: sub_review_bead $SUB_BEAD did not close within 45 minutes (last status: $SUB_STATUS)"
                exit 1
            fi
            sleep 60
            ;;
        *)
            bd update "$ROOT_ID" --notes "status: blocked
failure: sub_review_bead $SUB_BEAD has unexpected status '$SUB_STATUS'"
            exit 1
            ;;
    esac
done

VERDICT=$(bd show "$SUB_BEAD" --json | jq -r '.[0].notes // ""' \\
    | grep -m1 '^verdict:' | sed 's/^verdict: //')

case "$VERDICT" in
    approve|request_changes) ;;
    *)
        bd update "$ROOT_ID" --notes "status: blocked
failure: sub_review_bead $SUB_BEAD closed but no valid verdict in notes (saw: '$VERDICT')"
        exit 1
        ;;
esac

bd update "$ROOT_ID" --notes "verdict: $VERDICT"
```

**Exit criteria:** Sub-bead is closed, `verdict` is one of {approve,
request_changes}, and recorded on the root bead's notes.
"""
needs = ["run-review"]

[[steps]]
id = "route"
title = "Approve, or file a rollup fix bead"
description = """
Branch on the verdict. On `approve`, mark complete and exit — the
refinery's post-merge routing (gb-RTR) will pick up from there. On
`request_changes`, file a rollup fix bead against the
integration branch with the full metadata convention.

Read state:

```bash
ROOT_ID=$(bd mol current --json | jq -r 'if type == "array" then .[0].molecule_id else .molecule_id end')
NOTES=$(bd show "$ROOT_ID" --json | jq -r '.[0].notes // ""')
VERDICT=$(echo "$NOTES" | grep -m1 '^verdict:' | sed 's/^verdict: //')
REPORT_PATH=$(echo "$NOTES" | grep -m1 '^review_report:' | sed 's/^review_report: //')
RIG="${GC_RIG:-<rig>}"
```

### Approve path

On approve, the formula files the ship bead directly and closes this
review bead. We don't rely on the refinery's post-merge routing here:
`mol-feature-refinery-patrol` requires `metadata.branch` at intake, and
review beads carry no polecat branch — they'd fall through. Match the
request_changes path's pattern: do the routing inline.

```bash
if [ "$VERDICT" = "approve" ]; then
    bd update "$ROOT_ID" --notes "verdict: approve
review_report: $REPORT_PATH
status: complete"

    POLECAT_TARGET="${GC_RIG:+$GC_RIG/}gastown-beads-lite.polecat"
    FINAL_TARGET=$(bd show "$ROOT_ID" --json | jq -r '.[0].metadata.final_target // "main"')

    SHIP_BODY_FILE=$(mktemp -t feature-ship-body.XXXXXX.md)
    cat > "$SHIP_BODY_FILE" <<EOF
Auto-filed by mol-feature-review approve path for {{integration_branch}}.

Run mol-feature-ship against draft PR #{{pr}}. On all-green, the formula
flips the draft PR to ready-for-review (gh pr ready).
EOF

    SHIP_ID=$(bd create "Feature ship: {{integration_branch}}" \\
        --description-file "$SHIP_BODY_FILE" --json \\
        | jq -r '.id // .[0].id // empty')
    rm -f "$SHIP_BODY_FILE"

    if [ -z "$SHIP_ID" ] || [ "$SHIP_ID" = "null" ]; then
        # Routing failed — surface for human handoff. Keep the review bead
        # in_progress so the issue stays visible; do not close it.
        bd update "$ROOT_ID" \\
            --set-metadata gc.routed_to=human \\
            --set-metadata blocked_reason="feature-review: approve path could not file ship bead (bd create returned empty)"
        gc mail send "${GC_RIG:+$GC_RIG/}gastown-beads-lite.witness" \\
            -s "ESCALATION: feature-review could not file ship bead for {{integration_branch}}" \\
            -m "Review bead: $ROOT_ID
Verdict: approve
Integration: {{integration_branch}}
PR: #{{pr}}

Failed to create ship bead via bd create. Manual recovery: file a feature-ship bead by hand and sling to polecat pool." 2>&1 || true
        echo "[feature-review] APPROVED but ship-bead filing FAILED — escalated"
        exit 1
    fi

    bd update "$SHIP_ID" \\
        --set-metadata "target={{integration_branch}}" \\
        --set-metadata "merge_strategy=integration" \\
        --set-metadata "feature_phase=ship" \\
        --set-metadata "formula=mol-feature-ship" \\
        --set-metadata "pr={{pr}}" \\
        --set-metadata "integration_branch={{integration_branch}}" \\
        --set-metadata "final_target=$FINAL_TARGET" \\
        --set-metadata "gc.routed_to=$POLECAT_TARGET" \\
        --set-metadata "source_review_bead=$ROOT_ID"

    # Close the review bead — the polecat that ran this formula is now
    # done with this bead and should drain.
    bd close "$ROOT_ID" --reason "feature-review approved; filed ship bead $SHIP_ID"

    echo "[feature-review] APPROVED — filed ship bead $SHIP_ID"
    echo "[feature-review]   Integration branch: {{integration_branch}}"
    echo "[feature-review]   PR #{{pr}}"
    echo "[feature-review]   Report: $REPORT_PATH"
    exit 0
fi
```

### Request-changes path — run Codex to fix directly

Instead of filing a separate fix bead for a Claude polecat, run
`codex exec` directly in this polecat session. Codex reads the review
reports, applies fixes, verifies checks pass, and commits. The
refinery merges the polecat's worktree into the integration branch,
then post-merge routing files the post-fix review.

```bash
if [ "$VERDICT" = "request_changes" ]; then
    REPORT_DIR=$(dirname "$REPORT_PATH")

    # Collate findings via Haiku into a focused fix prompt
    RAW_REPORTS=$(mktemp -t codex-raw-reports.XXXXXX.md)
    {
        echo "## Claude review"
        [ -f "$REPORT_DIR/claude.md" ] && [ -s "$REPORT_DIR/claude.md" ] && cat "$REPORT_DIR/claude.md" || echo "(none)"
        echo ""
        echo "## Codex review"
        [ -f "$REPORT_DIR/codex.md" ] && [ -s "$REPORT_DIR/codex.md" ] && cat "$REPORT_DIR/codex.md" || echo "(none)"
        echo ""
        [ -f "$REPORT_DIR/risk.md" ] && [ -s "$REPORT_DIR/risk.md" ] && { echo "## Risk capstone"; cat "$REPORT_DIR/risk.md"; }
    } > "$RAW_REPORTS"

    PROMPT_FILE=$(mktemp -t codex-fix-prompt.XXXXXX.md)
    claude -m haiku --print -p "Extract actionable findings from these code review reports into a structured fix prompt for a coding agent. For each finding output:

- Issue number (sequential)
- Source (Claude or Codex)
- Severity (blocker/major/minor)
- One-line description of the bug or violation
- File path and line range
- Suggested fix (one sentence)

Skip all boilerplate: 'No Finding' sections, evidence bundles, fix validations, emoji footers, reaction prompts, and anything that is not an actionable code change. Output ONLY findings that require code edits. Format as markdown.

$(cat "$RAW_REPORTS")" > "$PROMPT_FILE" 2>/dev/null || {
        echo "[feature-review] Haiku collation failed; falling back to raw reports"
        cat "$RAW_REPORTS" > "$PROMPT_FILE"
    }
    rm -f "$RAW_REPORTS"

    # Append fix instructions
    cat >> "$PROMPT_FILE" <<'FIXINST'

## Instructions

- Fix every blocker and major finding listed above with focused code edits
- Add or update tests for each fix
- After all fixes, run the project checks and make sure they pass:
  - If package.json exists: run `npm run typecheck` then `npm test` (or `bun test` if bun.lock present)
  - If go.mod exists: run `go vet ./...` then `go test ./...`
  - If Makefile with test target: run `make test`
  - Run any lint scripts available (`npm run lint`, etc.)
- If a check fails, fix the failure before committing
- Commit all fixes with a clear message
- Do NOT refactor beyond what the findings require
FIXINST

    REPO_ROOT=$(git rev-parse --show-toplevel 2>/dev/null || pwd)
    CODEX_LOG=$(mktemp -t codex-fix-log.XXXXXX)
    CODEX_EXIT=0

    cd "$REPO_ROOT"
    (unset CLAUDECODE; codex exec \\
        -m gpt-5.5 \\
        --dangerously-bypass-approvals-and-sandbox \\
        -c model_reasoning_effort=max \\
        - < "$PROMPT_FILE" > "$CODEX_LOG" 2>&1) || CODEX_EXIT=$?

    rm -f "$PROMPT_FILE"

    if [ "$CODEX_EXIT" -ne 0 ]; then
        echo "[feature-review] WARN: codex exec failed (exit=$CODEX_EXIT)" >&2
        bd update "$ROOT_ID" --notes "verdict: $VERDICT
review_report: $REPORT_PATH
codex_fix: failed (exit=$CODEX_EXIT)
status: blocked
failure: codex exec failed"
        # fall through to failure path
    else
        # Verify codex made changes — check for uncommitted or recent commit
        if [ -n "$(git diff HEAD --name-only 2>/dev/null)" ] || [ -n "$(git diff --staged --name-only 2>/dev/null)" ]; then
            git add -A
            git commit -m "fix: address review findings via codex (PR #{{pr}})"
        fi
        CODEX_SHA=$(git rev-parse HEAD)

        bd update "$ROOT_ID" --notes "verdict: $VERDICT
review_report: $REPORT_PATH
codex_fix: applied at $CODEX_SHA
codex_fix_log: $CODEX_LOG
status: complete"

        bd close "$ROOT_ID" --reason "feature-review $VERDICT; codex fix applied at $CODEX_SHA"
        echo "[feature-review] $VERDICT — codex fix applied at $CODEX_SHA"
        echo "[feature-review]   Integration branch: {{integration_branch}}"
        echo "[feature-review]   PR #{{pr}}"
        echo "[feature-review]   Report: $REPORT_PATH"
        exit 0
    fi
fi
```

### Failure path

Reached if any prior step recorded `status: blocked` and jumped here,
or if the fix-bead creation above failed. Mark the bead routed to the
witness, then mail.

```bash
# Re-read status — if a prior step set status: blocked, honor it.
STATUS=$(bd show "$ROOT_ID" --json | jq -r '.[0].notes // ""' \\
    | grep -m1 '^status:' | sed 's/^status: //')
FAILURE=$(bd show "$ROOT_ID" --json | jq -r '.[0].notes // ""' \\
    | grep -m1 '^failure:' | sed 's/^failure: //')

if [ "$STATUS" = "blocked" ] || [ -z "$VERDICT" ]; then
    SUMMARY="${FAILURE:-unknown failure}"
    bd update "$ROOT_ID" \\
        --set-metadata gc.routed_to=$RIG/gastown-beads-lite.witness \\
        --notes "status: blocked
failure: $SUMMARY"

    gc mail send "$RIG/gastown-beads-lite.witness" \\
        -s "REVIEW FAILED: $ROOT_ID" \\
        -m "Feature review for {{integration_branch}} (PR #{{pr}}) failed: $SUMMARY. Bead: $ROOT_ID."

    echo "[feature-review] FAILED — witness mailed. Human triage required."
    echo "[feature-review]   Bead: $ROOT_ID"
    echo "[feature-review]   Reason: $SUMMARY"
    exit 1
fi
```

**Exit criteria:**
- `approve` → ship bead created with `target=integration_branch`,
  `merge_strategy=integration`, `feature_phase=ship`,
  `formula=mol-feature-ship`, `pr`, `integration_branch`,
  `final_target`, `gc.routed_to=<rig>/gastown-beads-lite.polecat`,
  `source_review_bead`; root review bead records verdict + status
  complete and is **closed** with a reason referencing the ship bead.
- `approve` ship-bead filing failure → review bead stays in_progress
  with `gc.routed_to=human` and `blocked_reason` set; witness mailed.
- `request_changes` → rollup fix bead exists with
  `target`, `feature_phase=fix`, `merge_strategy=integration`,
  `formula=mol-feature-polecat-work`,
  `gc.routed_to=<rig>/gastown-beads-lite.polecat`, `pr`,
  `review_round=1`, `source_review_bead`; dep edge fix blocked-by review; root bead
  records verdict + fix_bead_id + status complete, is closed, and the
  fix bead is slung/nudged to the polecat pool.
- Failure → bead routed to witness; mail sent; bead marked blocked.
"""
needs = ["read-verdict"]
