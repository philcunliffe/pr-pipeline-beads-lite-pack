description = """
Beads-lite refinery merge pass — feature integration-branch variant.

For beads carrying `metadata.target` (the integration branch) and
`metadata.merge_strategy=integration` (or unset; integration is the default
for this flow), the refinery rebases the polecat branch onto the integration
branch, pushes it back to origin, opens a GitHub PR `polecat -> integration`,
waits for CI, auto-merges, and closes the bead.

This formula is selected by the top-level dispatch step in
`mol-refinery-patrol` whenever the assigned work bead has `metadata.target`
set and `metadata.merge_strategy` is not `direct`. Beads without
`metadata.target` (or with `merge_strategy=direct`) continue through the
legacy direct flow in `mol-refinery-patrol` unchanged.

## Beads-Lite Command Note

In gastown-beads-lite rig sessions, translate the `bd ...` examples below to:

```bash
BEADS_DIR=<rig-root>/.beads gc gastown-beads-lite bd ...
```

## Work Bead Contract

Polecats hand off:

- `metadata.branch`: polecat source branch (`polecat/<bead-id>`)
- `metadata.target`: integration branch (`integration/<slug>`)
- `metadata.final_target`: branch the integration branch eventually merges into
- `metadata.merge_strategy`: typically `integration`
- `metadata.existing_pr`: optional existing PR URL to reuse

On success, refinery records `pr_url`, `pr_number`, `merged_sha`,
`merged_target`, and `merge_result=merged_via_pr`, then closes the bead. On
rebase conflict or branch-caused test failure, refinery reopens the bead to
the polecat pool with `metadata.rejection_reason` and routes
`gc.routed_to=<rig>/<binding_prefix>polecat` so the polecat session picks it
up for repair.

## PR Merge Method

Default merge method is `--squash` to keep the integration branch linear.
Set `{{pr_merge_method}}` to `merge`, `rebase`, or `squash` to match the
host repo's convention.

## Feature-Flow Auto-Routing (gb-RTR)

For beads carrying `metadata.feature_phase` (the autonomous feature flow),
the `post-merge-route` step runs after a successful merge and decides
whether to file the next phase bead — `review`, `ship`, or `fix-rollup`.
Routing fires only on the last merge for an integration branch (no other
open beads share the same `metadata.target`). Beads without
`metadata.feature_phase` skip routing.
"""
formula = "mol-feature-refinery-patrol"
version = 1
contract = "graph.v2"

[vars]
[vars.binding_prefix]
description = "Pack binding prefix used in session names"
default = "gastown-beads-lite."

[vars.work_query]
description = "Command that returns refinery work JSON"
default = "gc hook"

[vars.run_tests]
description = "Whether to run tests before merging"
default = "true"

[vars.setup_command]
description = "Setup/install command. Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command. Empty = skip."
default = ""

[vars.lint_command]
description = "Lint command. Empty = skip."
default = ""

[vars.test_command]
description = "Test command to run when run_tests is true. Empty = skip."
default = ""

[vars.build_command]
description = "Build command. Empty = skip."
default = ""

[vars.target_branch]
description = "Legacy fallback target. Integration-flow beads always carry metadata.target; this only fires if metadata.target is somehow missing."
default = "main"

[vars.delete_merged_branches]
description = "Whether to delete the polecat source branch after the PR merges"
default = "true"

[vars.pr_merge_method]
description = "gh pr merge method: squash, merge, or rebase. Default squash keeps the integration branch linear."
default = "squash"

[vars.ci_timeout_seconds]
description = "Seconds to wait for the PR CI run before rejecting back to the polecat pool. Set to 0 to skip CI polling and merge as soon as the PR is opened."
default = "1800"

[vars.ci_poll_interval_seconds]
description = "Seconds between CI status polls."
default = "30"

[[steps]]
id = "validate-identity"
title = "Validate refinery identity"
description = """
Fail fast if `$GC_AGENT` is not set. Refinery work is assigned to the
canonical agent identity, not to a guessed alias.

```bash
if [ -z "${GC_AGENT:-}" ]; then
    gc mail send mayor/ -s "ESCALATION: refinery started without GC_AGENT" \
      -m "The refinery session has no canonical agent identity."
    gc runtime drain-ack
    exit 1
fi
```

Close this step only when `$GC_AGENT` is non-empty."""

[[steps]]
id = "find-work"
title = "Find and claim one merge bead"
needs = ["validate-identity"]
description = """
Check the assigned queue first, then the configured work query:

```bash
WORK=$(bd list --assignee="$GC_AGENT" --status=in_progress --exclude-type=epic --json --limit=1 | jq -r '.[0].id // empty')
if [ -z "$WORK" ]; then
    WORK=$({{work_query}} | jq -r '.[0].id // empty')
fi
```

If no work is found, drain and exit:
```bash
if [ -z "$WORK" ]; then
    gc runtime drain-ack
    exit 0
fi
```

Claim the bead for this refinery pass:
```bash
bd update "$WORK" --status in_progress --assignee "$GC_AGENT"
bd show "$WORK" --json | jq '.[0].metadata'
```

Close this step with `$WORK` set."""

[[steps]]
id = "intake"
title = "Read metadata and confirm integration flow"
needs = ["find-work"]
description = """
This formula assumes integration flow. Confirm the metadata before doing
anything destructive.

```bash
BRANCH=$(bd show "$WORK" --json | jq -r '.[0].metadata.branch // empty')
TARGET=$(bd show "$WORK" --json | jq -r '.[0].metadata.target // empty')
STRATEGY=$(bd show "$WORK" --json | jq -r '.[0].metadata.merge_strategy // empty')
FINAL_TARGET=$(bd show "$WORK" --json | jq -r '.[0].metadata.final_target // empty')
RUN_BRANCH="refinery/$WORK"
```

`metadata.target` is required. If it is empty or `metadata.merge_strategy`
is `direct`, dispatch in `mol-refinery-patrol` should have chosen the legacy
flow; getting here is a configuration error:

```bash
if [ -z "$TARGET" ] || [ "$STRATEGY" = "direct" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="mol-feature-refinery-patrol invoked without integration metadata (target=$TARGET strategy=$STRATEGY)"
    gc mail send mayor/ -s "ESCALATION: refinery integration flow without metadata.target" \
      -m "Work bead: $WORK"
    gc runtime drain-ack
    exit 1
fi
```

`metadata.branch` is required (same contract as the legacy refinery):

```bash
if [ -z "$BRANCH" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="metadata.branch is required for refinery"
    gc mail send mayor/ -s "ESCALATION: refinery bead missing branch" -m "Work bead: $WORK"
    gc runtime drain-ack
    exit 1
fi
```

`metadata.pr` is required and must point to an open draft PR whose head
matches `metadata.target` (the integration branch). Catching a bad
`metadata.pr` here is much cheaper than discovering it at `push-and-pr` or
`mol-feature-ship`, after the refinery has already rebased and tested.

```bash
PR=$(bd show "$WORK" --json | jq -r '.[0].metadata.pr // empty')

if [ -z "$PR" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="intake: metadata.pr missing — feature beads must carry the integration draft PR number"
    gc mail send mayor/ -s "ESCALATION: feature bead $WORK missing metadata.pr" \
      -m "Work bead: $WORK
Feature flow requires metadata.pr to point to the integration-branch draft PR.
This bead has merge_strategy=integration but no pr value.
Likely cause: bead filed without /feature-launch, or /feature-launch had a bug.
Recommended: close this bead and re-file via /feature-launch."
    gc runtime drain-ack
    exit 1
fi

PR_JSON=$(gh pr view "$PR" --json state,isDraft,headRefName 2>/dev/null || echo "")
if [ -z "$PR_JSON" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="intake: gh pr view $PR failed (PR does not exist or auth issue)"
    gc mail send mayor/ -s "ESCALATION: feature bead $WORK refers to unviewable PR #$PR" \
      -m "Work bead: $WORK
gh pr view $PR returned no data. The PR may be deleted, in another repo, or gh auth may have failed."
    gc runtime drain-ack
    exit 1
fi

PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
PR_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft')
PR_HEAD=$(echo "$PR_JSON" | jq -r '.headRefName')

if [ "$PR_STATE" != "OPEN" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="intake: PR #$PR is $PR_STATE (must be OPEN)"
    gc mail send mayor/ -s "ESCALATION: feature bead $WORK refers to $PR_STATE PR #$PR" \
      -m "Work bead: $WORK
The feature integration PR must stay OPEN throughout the flow."
    gc runtime drain-ack
    exit 1
fi

if [ "$PR_DRAFT" != "true" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="intake: PR #$PR is not a draft (must be draft until mol-feature-ship)"
    gc mail send mayor/ -s "ESCALATION: feature bead $WORK refers to non-draft PR #$PR" \
      -m "Work bead: $WORK
The feature integration PR must remain in draft state until mol-feature-ship flips it ready."
    gc runtime drain-ack
    exit 1
fi

if [ "$PR_HEAD" != "$TARGET" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="intake: PR #$PR head '$PR_HEAD' does not match metadata.target '$TARGET'"
    gc mail send mayor/ -s "ESCALATION: feature bead $WORK PR/target mismatch" \
      -m "Work bead: $WORK
PR #$PR head: $PR_HEAD
metadata.target: $TARGET
These must match. Check /feature-launch slug versus bead metadata.target."
    gc runtime drain-ack
    exit 1
fi

echo "intake: metadata.pr=$PR validated (open draft, head=$PR_HEAD)"
```

Close this step with `$WORK`, `$BRANCH`, `$TARGET`, `$STRATEGY`,
`$FINAL_TARGET`, `$RUN_BRANCH`, and `$PR` all set."""

[[steps]]
id = "rebase"
title = "Rebase polecat branch onto the integration branch"
needs = ["intake"]
description = """
Fetch the source and target branches:
```bash
git fetch --prune origin
git fetch origin "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"
git fetch origin "$TARGET"
```

Create a local refinery branch and rebase it onto the integration branch:
```bash
git checkout -B "$RUN_BRANCH" "origin/$BRANCH"
git rebase "origin/$TARGET"
```

If the rebase conflicts, reject the bead back to the polecat pool. Leave the
polecat source branch intact — a new polecat needs it for recovery:

```bash
git rebase --abort
REASON="Conflicts with $TARGET at $(git rev-parse origin/$TARGET)"
bd update "$WORK" \
  --status open \
  --assignee "" \
  --set-metadata rejection_reason="$REASON" \
  --set-metadata merge_result=rejected \
  --set-metadata gc.routed_to="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
git checkout "origin/$TARGET"
git branch -D "$RUN_BRANCH" 2>/dev/null || true
gc runtime drain-ack
exit 1
```

**Exit criteria:** `$RUN_BRANCH` is rebased on `origin/$TARGET`."""

[[steps]]
id = "run-checks"
title = "Run configured verification"
needs = ["rebase"]
description = """
Run configured checks from the rebased refinery branch:

```bash
{{setup_command}}
{{typecheck_command}}
{{lint_command}}
{{build_command}}
```

If `run_tests` is true, run:
```bash
{{test_command}}
```

Skip empty commands silently. Track exactly which checks passed or failed."""

[[steps]]
id = "handle-failures"
title = "Reject branch-caused failures"
needs = ["run-checks"]
description = """
If all configured checks passed, continue to `push-and-pr`.

If a check failed, decide whether the failure is caused by the source branch
or already exists on the integration branch.

For a branch-caused failure, send the bead back to polecats:
```bash
SUMMARY="<failure summary>"
bd update "$WORK" \
  --status open \
  --assignee "" \
  --set-metadata rejection_reason="$SUMMARY" \
  --set-metadata merge_result=rejected \
  --set-metadata gc.routed_to="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
git checkout "origin/$TARGET"
git branch -D "$RUN_BRANCH" 2>/dev/null || true
gc runtime drain-ack
exit 1
```

Leave the polecat source branch intact so a polecat can resume it.

For a pre-existing target failure, check for an existing bug and create one
if needed, then continue:
```bash
bd search "<failure summary>" --json
bd create "Pre-existing failure: <summary>" --type bug --priority 1
```

Do not fix code in the refinery. The refinery is a merge processor."""

[[steps]]
id = "push-and-pr"
title = "Push the rebased branch and open the PR"
needs = ["handle-failures"]
description = """
Push the rebased polecat branch back to origin. `--force-with-lease` is safe
because the polecat handed the branch off; only the refinery is moving it
forward in this window.

```bash
git checkout "$RUN_BRANCH"
git push origin HEAD:"$BRANCH" --force-with-lease
```

Open the per-bead PR `polecat -> integration`. If a PR already exists for the
branch (rejection-aware resume; `metadata.existing_pr` set), reuse it.

```bash
EXISTING_PR=$(bd show "$WORK" --json | jq -r '.[0].metadata.existing_pr // empty')
ISSUE_TITLE=$(bd show "$WORK" --json | jq -r '.[0].title')
NOTES=$(bd show "$WORK" --json | jq -r '.[0].notes // empty')

PR_BODY=$(cat <<EOF
## Summary

$ISSUE_TITLE

$NOTES

## Delivery

- Issue: $WORK
- Branch: $BRANCH
- Integration target: $TARGET
- Eventual target: ${FINAL_TARGET:-(unset)}

This PR is auto-merged into the integration branch once CI is green. Human
review for the full feature happens on the downstream PR
(`$TARGET -> <final target>`), which is opened separately when the feature
is ready to ship.
EOF
)

if [ -n "$EXISTING_PR" ]; then
    PR_URL="$EXISTING_PR"
else
    PR_URL=$(gh pr create \
      --base "$TARGET" \
      --head "$BRANCH" \
      --title "$ISSUE_TITLE ($WORK)" \
      --body "$PR_BODY" 2>/dev/null || true)
    if [ -z "$PR_URL" ]; then
        # A PR for this head may already exist (re-run after partial failure).
        PR_URL=$(gh pr view "$BRANCH" --json url -q '.url' 2>/dev/null || true)
    fi
fi

if [ -z "$PR_URL" ]; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="Could not create or discover PR for $BRANCH -> $TARGET"
    gc mail send mayor/ -s "ESCALATION: refinery could not open PR" \
      -m "Work bead: $WORK
Branch: $BRANCH
Target: $TARGET"
    gc runtime drain-ack
    exit 1
fi

PR_NUMBER=$(gh pr view "$BRANCH" --json number -q '.number')
bd update "$WORK" \
  --set-metadata pr_url="$PR_URL" \
  --set-metadata pr_number="$PR_NUMBER"
```

**Exit criteria:** PR exists on the host repo and its URL/number are recorded
on the bead."""

[[steps]]
id = "wait-ci"
title = "Wait for PR CI to settle"
needs = ["push-and-pr"]
description = """
**Config: ci_timeout_seconds = {{ci_timeout_seconds}}**
**Config: ci_poll_interval_seconds = {{ci_poll_interval_seconds}}**

Skip polling entirely when `ci_timeout_seconds` is `0`. This is a safe
opt-out for repos that don't run CI on PRs:

```bash
if [ "{{ci_timeout_seconds}}" = "0" ]; then
    echo "CI polling disabled; proceeding to merge."
    # Close this step.
fi
```

Otherwise poll the PR's combined check status until it settles or the
timeout fires:

```bash
DEADLINE=$(( $(date +%s) + {{ci_timeout_seconds}} ))
while : ; do
    NOW=$(date +%s)
    if [ "$NOW" -ge "$DEADLINE" ]; then
        bd update "$WORK" \
          --status open \
          --assignee "" \
          --set-metadata rejection_reason="CI did not settle within {{ci_timeout_seconds}}s for PR $PR_URL" \
          --set-metadata merge_result=rejected \
          --set-metadata gc.routed_to="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
        git checkout "origin/$TARGET"
        git branch -D "$RUN_BRANCH" 2>/dev/null || true
        gc runtime drain-ack
        exit 1
    fi

    STATE=$(gh pr view "$BRANCH" --json statusCheckRollup,mergeStateStatus -q '
        if (.statusCheckRollup // []) | length == 0 then
            "NO_CHECKS"
        else
            ([.statusCheckRollup[] | (.conclusion // .status // "PENDING")] | unique | sort | join(","))
        end')

    case "$STATE" in
        NO_CHECKS|SUCCESS|"SUCCESS,SKIPPED"|"SKIPPED,SUCCESS"|SKIPPED|NEUTRAL|"NEUTRAL,SUCCESS"|"SUCCESS,NEUTRAL")
            echo "CI green ($STATE); proceeding to merge."
            break
            ;;
        *FAILURE*|*ERROR*|*CANCELLED*|*TIMED_OUT*|*ACTION_REQUIRED*)
            bd update "$WORK" \
              --status open \
              --assignee "" \
              --set-metadata rejection_reason="CI failed on PR $PR_URL (state=$STATE)" \
              --set-metadata merge_result=rejected \
              --set-metadata gc.routed_to="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
            git checkout "origin/$TARGET"
            git branch -D "$RUN_BRANCH" 2>/dev/null || true
            gc runtime drain-ack
            exit 1
            ;;
        *)
            # PENDING / QUEUED / IN_PROGRESS — keep polling.
            sleep {{ci_poll_interval_seconds}}
            ;;
    esac
done
```

Leave the polecat source branch intact on rejection; the polecat resumes from
it.

**Exit criteria:** CI is green (or polling is disabled), and the PR is safe to merge."""

[[steps]]
id = "merge"
title = "Merge the PR into the integration branch"
needs = ["wait-ci"]
description = """
**Config: pr_merge_method = {{pr_merge_method}}**
**Config: delete_merged_branches = {{delete_merged_branches}}**

Pick the gh merge flag:

```bash
case "{{pr_merge_method}}" in
    squash) MERGE_FLAG="--squash" ;;
    merge)  MERGE_FLAG="--merge"  ;;
    rebase) MERGE_FLAG="--rebase" ;;
    *)
        bd update "$WORK" \
          --status open \
          --assignee "" \
          --set-metadata merge_result=blocked \
          --set-metadata gc.routed_to=human \
          --set-metadata blocked_reason="Unsupported pr_merge_method={{pr_merge_method}}"
        gc mail send mayor/ -s "ESCALATION: unsupported pr_merge_method" -m "Work bead: $WORK"
        gc runtime drain-ack
        exit 1
        ;;
esac

DELETE_FLAG=""
if [ "{{delete_merged_branches}}" = "true" ]; then
    DELETE_FLAG="--delete-branch"
fi

if ! gh pr merge "$PR_NUMBER" $MERGE_FLAG $DELETE_FLAG; then
    bd update "$WORK" \
      --status open \
      --assignee "" \
      --set-metadata merge_result=blocked \
      --set-metadata gc.routed_to=human \
      --set-metadata blocked_reason="gh pr merge failed for PR $PR_URL"
    gc mail send mayor/ -s "ESCALATION: refinery PR merge failed" \
      -m "PR: $PR_URL
Work bead: $WORK
Branch: $BRANCH -> $TARGET
gh pr merge $MERGE_FLAG exited non-zero. PR left open for manual handling."
    gc runtime drain-ack
    exit 1
fi
```

Refresh local state from the merged integration branch and capture the
resulting SHA:

```bash
git fetch origin "$TARGET"
git checkout "$TARGET" 2>/dev/null || git checkout -B "$TARGET" "origin/$TARGET"
git reset --hard "origin/$TARGET"
MERGED_SHA=$(git rev-parse HEAD)
MERGED_SHORT=$(git rev-parse --short HEAD)
git branch -D "$RUN_BRANCH" 2>/dev/null || true
```

**Exit criteria:** PR merged into `$TARGET`, polecat branch optionally
deleted on origin, local `$TARGET` reset to the merged tip."""

[[steps]]
id = "post-merge-route"
title = "Route the next feature-flow bead on last-merge detection"
needs = ["merge"]
description = """
After a per-bead merge succeeds, decide whether this was the last merge for
the integration branch (`$TARGET`). If so, file the next bead in the
autonomous feature flow: review, post-fix review, or ship. If sibling beads
are still open, this step is a no-op.

Beads outside the feature flow (no `metadata.feature_phase` set) skip
routing entirely.

This step must never crash the refinery patrol — the per-bead merge already
succeeded and must still be recorded by `close-bead`. On any routing
failure, route the current bead to the rig witness and mail, then continue.

## Skip when no feature_phase is set

```bash
PHASE=$(bd show "$WORK" --json | jq -r '.[0].metadata.feature_phase // empty')
PR=$(bd show "$WORK" --json | jq -r '.[0].metadata.pr // empty')

if [ -z "$PHASE" ]; then
    echo "post-merge-route: no feature_phase on bead; routing not applicable."
    # Close this step.
fi
```

## Last-merge detection

Query any other open beads sharing this `metadata.target`. Exclude `$WORK`
because the bead is still `in_progress` at this point (`close-bead` runs
next).

```bash
OPEN_SIBLINGS=$(bd list --status=open,in_progress --json | \
    jq --arg t "$TARGET" --arg w "$WORK" \
       '[.[] | select(.metadata.target == $t and .id != $w)] | length')

if [ "$OPEN_SIBLINGS" != "0" ]; then
    echo "post-merge-route: $OPEN_SIBLINGS open sibling(s) remain for $TARGET; not the last merge."
    # Close this step.
fi
```

## Route based on phase

Resolve the polecat and witness targets, and define the helper that files
the next bead with the canonical routing metadata.

```bash
POLECAT_TARGET="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
WITNESS_TARGET="${GC_RIG:+$GC_RIG/}{{binding_prefix}}witness"
ROUTE_ERR=""
NEW_BEAD=""

# Helper: does a next-phase bead already exist for this target?
# Returns the bead ID if found, empty otherwise. Used to keep this step
# idempotent — if close-bead failed last run and the formula re-fires,
# we must not file a second next-phase bead for the same target.
next_phase_bead_exists() {
    local target="$1"
    local phase="$2"
    bd list --status=open,in_progress --json | \
        jq -r --arg t "$target" --arg p "$phase" \
           '[.[] | select(.metadata.target == $t and .metadata.feature_phase == $p)] | .[0].id // empty'
}

# Helper: create the next-phase bead and stamp the canonical metadata.
# Sets $NEW_BEAD on success; returns non-zero on failure.
write_next_bead() {
    local title="$1"; local phase="$2"; local formula="$3"; local body="$4"
    local body_file
    body_file=$(mktemp -t fr-body.XXXXXX.md)
    printf '%s\\n' "$body" > "$body_file"
    NEW_BEAD=$(bd create "$title" --description-file "$body_file" --json \
        | jq -r '.id // .[0].id // empty')
    rm -f "$body_file"
    if [ -z "$NEW_BEAD" ] || [ "$NEW_BEAD" = "null" ]; then
        NEW_BEAD=""
        return 1
    fi
    bd update "$NEW_BEAD" \
      --set-metadata target="$TARGET" \
      --set-metadata feature_phase="$phase" \
      --set-metadata formula="$formula" \
      --set-metadata gc.routed_to="$POLECAT_TARGET" \
      --set-metadata pr="$PR" \
      --set-metadata integration_branch="$TARGET"
    if [ -n "$FINAL_TARGET" ]; then
        bd update "$NEW_BEAD" --set-metadata final_target="$FINAL_TARGET"
    fi
}
```

### `work` → file review bead

```bash
case "$PHASE" in
    work)
        EXISTING=$(next_phase_bead_exists "$TARGET" review)
        if [ -n "$EXISTING" ]; then
            echo "post-merge-route: review bead $EXISTING already exists for $TARGET; skipping (idempotent)."
        else
            write_next_bead "Feature review: $TARGET" review mol-feature-review \
"Auto-filed by gb-RTR after the final work-bead merged for $TARGET.

Run the outgoing-PR scorecard against draft PR #$PR (head: $TARGET).
On approve, mol-feature-review files the ship bead. On request_changes,
mol-feature-review files a rollup fix bead targeting $TARGET;
after that fix merges, gb-RTR files a post-fix review/advisory bead." \
              || ROUTE_ERR="bd create failed for review bead (phase=work)"
        fi
        ;;
```

### `review` → file ship bead (only on `approve` verdict)

`mol-feature-review` writes `verdict: <approve|request_changes>` into
the review bead's notes. On non-approve, that formula has already filed
the rollup fix bead, so routing has nothing to do.

```bash
    review)
        VERDICT=$(bd show "$WORK" --json | jq -r '.[0].notes // ""' \
            | grep -m1 '^verdict:' | sed 's/^verdict: *//')
        case "$VERDICT" in
            approve)
                EXISTING=$(next_phase_bead_exists "$TARGET" ship)
                if [ -n "$EXISTING" ]; then
                    echo "post-merge-route: ship bead $EXISTING already exists for $TARGET; skipping (idempotent)."
                else
                    write_next_bead "Feature ship: $TARGET" ship mol-feature-ship \
"Auto-filed by gb-RTR after review approve for $TARGET.

Run mol-feature-ship against draft PR #$PR. On all-green, the formula
flips the draft PR to ready-for-review (gh pr ready)." \
                      || ROUTE_ERR="bd create failed for ship bead (phase=review approve)"
                fi
                ;;
            request_changes)
                echo "post-merge-route: review verdict=$VERDICT — mol-feature-review filed the rollup fix bead; nothing to route."
                ;;
            "")
                ROUTE_ERR="phase=review but verdict missing from notes"
                ;;
            *)
                ROUTE_ERR="phase=review but verdict='$VERDICT' is unrecognized"
                ;;
        esac
        ;;
```

### `fix` → file post-fix review/advisory bead

After each rollup fix lands, run another dual-review pass before the PR is
eligible for ship. That post-fix review records an auto-merge advisory
and either files ship, files another capped fix cycle, or stops for
human triage when the configured review-round cap is reached.

```bash
    fix)
        EXISTING=$(next_phase_bead_exists "$TARGET" post_fix_review)
        if [ -n "$EXISTING" ]; then
            echo "post-merge-route: post-fix review bead $EXISTING already exists for $TARGET; skipping (idempotent)."
        else
            FIX_META=$(bd show "$WORK" --json | jq -c '.[0].metadata // {}')
            SOURCE_REVIEW_BEAD=$(echo "$FIX_META" | jq -r '.source_review_bead // ""')
            SOURCE_POST_FIX_REVIEW_BEAD=$(echo "$FIX_META" | jq -r '.source_post_fix_review_bead // ""')
            LAST_REVIEW_ROUND=$(echo "$FIX_META" | jq -r '.review_round // "1"')
            case "$LAST_REVIEW_ROUND" in
                ''|*[!0-9]*) LAST_REVIEW_ROUND=1 ;;
            esac
            NEXT_REVIEW_ROUND=$((LAST_REVIEW_ROUND + 1))

            write_next_bead "Post-fix review: $TARGET" post_fix_review mol-feature-post-fix-review \
"Auto-filed by gb-RTR after a rollup fix merged for $TARGET.

Run mol-feature-post-fix-review against draft PR #$PR (head: $TARGET).
This re-runs the dual-review after the fix and records an auto-merge
advisory. On acceptable review results it files mol-feature-ship; on
remaining review blockers it files another capped fix cycle until the
configured review-round cap is reached." \
              || ROUTE_ERR="bd create failed for post-fix review bead (phase=fix)"

            if [ -n "$NEW_BEAD" ]; then
                bd update "$NEW_BEAD" \
                  --set-metadata source_fix_bead="$WORK" \
                  --set-metadata review_round="$NEXT_REVIEW_ROUND"
                if [ -n "$SOURCE_REVIEW_BEAD" ]; then
                    bd update "$NEW_BEAD" --set-metadata source_review_bead="$SOURCE_REVIEW_BEAD"
                fi
                if [ -n "$SOURCE_POST_FIX_REVIEW_BEAD" ]; then
                    bd update "$NEW_BEAD" --set-metadata previous_post_fix_review_bead="$SOURCE_POST_FIX_REVIEW_BEAD"
                fi
            fi
        fi
        ;;
```

### `ship` → terminal phase

```bash
    ship)
        echo "post-merge-route: phase=ship — autonomous loop terminates; mol-feature-ship handles the human handoff."
        ;;

    *)
        ROUTE_ERR="unrecognized feature_phase='$PHASE'"
        ;;
esac
```

## Failure handling

If routing failed, route the current bead to the rig witness and mail. Do
not crash — `close-bead` still has to record the merge.

```bash
if [ -n "$ROUTE_ERR" ]; then
    bd update "$WORK" --set-metadata gc.routed_to="$WITNESS_TARGET"
    gc mail send "$WITNESS_TARGET" \
        -s "ROUTE FAILED: $WORK (phase=$PHASE, target=$TARGET)" \
        -m "Bead: $WORK
Phase: $PHASE
Target: $TARGET
Reason: $ROUTE_ERR

The per-bead merge succeeded but the feature-flow routing could not file
the next bead. Human triage required to resume the autonomous loop."
fi
```

**Exit criteria:** Either (a) the next-phase bead exists with full routing
metadata, OR (b) routing was a no-op (no `feature_phase`, open siblings
remain, ship phase, or review without approve), OR (c) a witness mail has
been sent and the current bead is routed to the witness."""

[[steps]]
id = "close-bead"
title = "Record merge metadata and close the bead"
needs = ["post-merge-route"]
description = """
Record the durable merge result and close the bead. The downstream
`integration -> final_target` PR (the human-review surface for the full
feature) is opened by a separate workflow when the feature is ready to ship —
this formula's responsibility ends at per-bead merge.

This step is idempotent: if the bead is already closed (because a previous
run reached this point and only the bd-call after it failed), skip the
close and only patch missing metadata. Re-closing would otherwise error
and tank the patrol on the second pass.

```bash
CURRENT_STATUS=$(bd show "$WORK" --json | jq -r '.[0].status')
if [ "$CURRENT_STATUS" = "closed" ]; then
    echo "close-bead: $WORK is already closed; skipping (idempotent)."
    EXISTING_MERGE_RESULT=$(bd show "$WORK" --json | jq -r '.[0].metadata.merge_result // empty')
    if [ -z "$EXISTING_MERGE_RESULT" ]; then
        bd update "$WORK" --set-metadata merge_result=merged_via_pr
    fi
else
    bd update "$WORK" \
      --set-metadata merge_result=merged_via_pr \
      --set-metadata merged_sha="$MERGED_SHA" \
      --set-metadata merged_target="$TARGET" \
      --unset-metadata rejection_reason
    bd close "$WORK" --reason "PR #$PR_NUMBER merged into $TARGET at $MERGED_SHORT"
fi
```

**Exit criteria:** Bead closed with `pr_url`, `pr_number`, `merged_sha`,
`merged_target`, and `merge_result=merged_via_pr` recorded."""

[[steps]]
id = "drain"
title = "Drain refinery session"
needs = ["close-bead"]
description = """
Summarize the merge result in the bead close reason or notes, then drain:

```bash
gc runtime drain-ack
exit
```

The on-demand refinery will wake again when more work is assigned."""
